# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  dev:
    taskfile: ./dev/Taskfile.yml # 子 Taskfile 路径
    dir: ./dev # 该 Taskfile 所在目录（关键）
    aliases:
      - dev
  staging:
    taskfile: ./staging/Taskfile.yml
    dir: ./staging
    aliases:
      - staging
  prod:
    taskfile: ./prod/Taskfile.yml
    dir: ./prod
    aliases:
      - prod
tasks:
  default:
    desc: Kubernetes Overlays 开发测试生产环境
    dir: '{{.TASKFILE_DIR}}' # 强制在当前 Taskfile 所在目录（deploy/k8s/overlays/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/deploy/k8s/overlays/
      - ls # 只会列出 deploy/k8s/overlays/ 下的文件
    silent: true
