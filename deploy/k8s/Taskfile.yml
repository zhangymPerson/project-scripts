# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  helm:
    taskfile: ./helm/Taskfile.yml # 子 Taskfile 路径
    dir: ./helm # 该 Taskfile 所在目录（关键）
    aliases:
      - helm
  base:
    taskfile: ./base/Taskfile.yml
    dir: ./base
    aliases:
      - base
  overlays:
    taskfile: ./overlays/Taskfile.yml
    dir: ./overlays
    aliases:
      - overlays
tasks:
  default:
    desc: Kubernetes Helm Base Overlays 配置管理
    dir: . # 强制在当前 Taskfile 所在目录（deploy/k8s/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/deploy/k8s/
      - ls # 只会列出 deploy/k8s/ 下的文件
    silent: true
