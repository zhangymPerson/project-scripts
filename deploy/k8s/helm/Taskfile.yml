# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  myapp:
    taskfile: ./myapp/Taskfile.yml # 子 Taskfile 路径
    dir: ./myapp # 该 Taskfile 所在目录（关键）
    aliases:
      - myapp
tasks:
  default:
    desc: Helm Charts MyApp 应用部署
    dir: '{{.TASKFILE_DIR}}' # 强制在当前 Taskfile 所在目录（deploy/k8s/helm/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/deploy/k8s/helm/
      - ls # 只会列出 deploy/k8s/helm/ 下的文件
    silent: true
