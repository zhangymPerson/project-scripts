# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  clean:
    taskfile: ./clean/Taskfile.yml # 子 Taskfile 路径
    dir: ./clean # 该 Taskfile 所在目录（关键）
    aliases:
      - clean
  etl:
    taskfile: ./etl/Taskfile.yml
    dir: ./etl
    aliases:
      - etl
  transfer:
    taskfile: ./transfer/Taskfile.yml
    dir: ./transfer
    aliases:
      - transfer
tasks:
  default:
    desc: 数据清洗 ETL 数据处理 数据转移
    dir: . # 强制在当前 Taskfile 所在目录（data/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/data/
      - ls # 只会列出 data/ 下的文件
    silent: true
