# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  rest-client:
    taskfile: ./rest-client/Taskfile.yml # 子 Taskfile 路径
    dir: ./rest-client # 该 Taskfile 所在目录（关键）
    aliases:
      - rest-client
  hurl:
    taskfile: ./hurl/Taskfile.yml
    dir: ./hurl
    aliases:
      - hurl
tasks:
  default:
    desc: REST Client Hurl HTTP 测试示例
    dir: '{{.TASKFILE_DIR}}' # 强制在当前 Taskfile 所在目录（examples/http/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/examples/http/
      - ls # 只会列出 examples/http/ 下的文件
    silent: true
