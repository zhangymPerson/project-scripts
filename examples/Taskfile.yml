# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  python:
    taskfile: ./python/Taskfile.yml # 子 Taskfile 路径
    dir: ./python # 该 Taskfile 所在目录（关键）
    aliases:
      - python
  shell:
    taskfile: ./shell/Taskfile.yml
    dir: ./shell
    aliases:
      - shell
  sql:
    taskfile: ./sql/Taskfile.yml
    dir: ./sql
    aliases:
      - sql
  http:
    taskfile: ./http/Taskfile.yml
    dir: ./http
    aliases:
      - http
tasks:
  default:
    desc: Python Shell SQL HTTP REST Client 代码示例
    dir: '{{.TASKFILE_DIR}}' # 强制在当前 Taskfile 所在目录（examples/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/examples/
      - ls # 只会列出 examples/ 下的文件
    silent: true
