# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  adr:
    taskfile: ./adr/Taskfile.yml # 子 Taskfile 路径
    dir: ./adr # 该 Taskfile 所在目录（关键）
    aliases:
      - adr
tasks:
  default:
    desc: ADR 架构决策记录 文档管理
    dir: '{{.TASKFILE_DIR}}' # 强制在当前 Taskfile 所在目录（docs/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/docs/
      - ls # 只会列出 docs/ 下的文件
    silent: true
