# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  kafka:
    taskfile: ./kafka/Taskfile.yml # 子 Taskfile 路径
    dir: ./kafka # 该 Taskfile 所在目录（关键）
    aliases:
      - kafka
  rabbitmq:
    taskfile: ./rabbitmq/Taskfile.yml
    dir: ./rabbitmq
    aliases:
      - rabbit
  redis-streams:
    taskfile: ./redis-streams/Taskfile.yml
    dir: ./redis-streams
    aliases:
      - redis
      - streams
tasks:
  default:
    desc: Kafka RabbitMQ Redis Streams 消息队列管理
    dir: '{{.TASKFILE_DIR}}' # 强制在当前 Taskfile 所在目录（mq/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/mq/
      - ls # 只会列出 mq/ 下的文件
    silent: true
