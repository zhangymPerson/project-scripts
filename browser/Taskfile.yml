# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
tasks:
  mac-start-edge:
    desc: macOS 启动 Microsoft Edge 浏览器（Playwright 调试模式）
    env:
      EDGE_PLAYWRIGHT_USER_DATA_DIR: "/tmp/edge-playwright-data"
    cmds:
      - |
        #!/usr/bin/env bash
        echo "检查 Microsoft Edge 浏览器调试模式状态..."

        # 检查是否已有以调试模式（端口 9222）运行的 Edge 实例
        if lsof -i :9222 | grep -q "Microsoft Edge"; then
            echo "Microsoft Edge 浏览器已在调试模式下运行（端口: 9222）"
            echo "用户数据目录: $EDGE_PLAYWRIGHT_USER_DATA_DIR"
            exit 0
        fi

        # 检查是否有其他 Edge 进程占用调试端口
        if lsof -i :9222 > /dev/null 2>&1 && ! lsof -i :9222 | grep -q "Microsoft Edge"; then
            echo "调试端口 9222 被其他进程占用，请先关闭"
            exit 1
        fi

        mkdir -p "$EDGE_PLAYWRIGHT_USER_DATA_DIR"
        echo "启动 Microsoft Edge 浏览器（Playwright 调试模式）..."

        # 启动 Edge 浏览器
        '/Applications/Microsoft Edge.app/Contents/MacOS/Microsoft Edge' \
            --remote-debugging-port=9222 \
            --user-data-dir="$EDGE_PLAYWRIGHT_USER_DATA_DIR" \
            --no-first-run \
            --no-default-browser-check \
            --disable-features=RendererCodeIntegrity \
            'about:blank' >/dev/null 2>&1 &

        EDGE_PID=$!

        # 等待浏览器启动
        sleep 3

        # 验证浏览器是否成功启动并监听调试端口
        if lsof -i :9222 | grep -q "Microsoft Edge"; then
            echo "✅ 浏览器已成功启动并监听调试端口: 9222"
            echo "PID: $EDGE_PID"
            echo "用户数据目录: $EDGE_PLAYWRIGHT_USER_DATA_DIR"
        else
            echo "❌ 浏览器启动失败"
            kill $EDGE_PID 2>/dev/null || true
            exit 1
        fi
  baidu:
    desc: 运行百度浏览器示例
    cmds:
      - uv run browser_example_baidu.py
  format:
    desc: 格式化代码
    cmds:
      - just --fmt
      - uvx ruff check --fix .
    silent: false
