# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  configs:
    taskfile: ./configs/Taskfile.yml # 子 Taskfile 路径
    dir: ./configs # 该 Taskfile 所在目录（关键）
    aliases:
      - configs
  jobs:
    taskfile: ./jobs/Taskfile.yml
    dir: ./jobs
    aliases:
      - jobs
tasks:
  default:
    desc: Cron 定时任务 配置管理
    dir: . # 强制在当前 Taskfile 所在目录（cron/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/cron/
      - ls # 只会列出 cron/ 下的文件
    silent: true
