# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  mysql:
    taskfile: ./mysql/Taskfile.yml # 子 Taskfile 路径
    dir: ./mysql # 该 Taskfile 所在目录（关键）
    aliases:
      - mysql
  postgresql:
    taskfile: ./postgresql/Taskfile.yml
    dir: ./postgresql
    aliases:
      - pg
      - postgres
  mongodb:
    taskfile: ./mongodb/Taskfile.yml
    dir: ./mongodb
    aliases:
      - mongo
  elasticsearch:
    taskfile: ./elasticsearch/Taskfile.yml
    dir: ./elasticsearch
    aliases:
      - es
  redis:
    taskfile: ./redis/Taskfile.yml
    dir: ./redis
    aliases:
      - redis
  sqlite:
    taskfile: ./sqlite/Taskfile.yml
    dir: ./sqlite
    aliases:
      - sqlite
tasks:
  default:
    desc: MySQL PostgreSQL MongoDB Redis Elasticsearch SQLite 数据库管理
    dir: . # 强制在当前 Taskfile 所在目录（db/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/db/
      - ls # 只会列出 db/ 下的文件
    silent: true
