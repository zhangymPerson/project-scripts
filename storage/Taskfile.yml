# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  s3:
    taskfile: ./s3/Taskfile.yml # 子 Taskfile 路径
    dir: ./s3 # 该 Taskfile 所在目录（关键）
    aliases:
      - s3
  minio:
    taskfile: ./minio/Taskfile.yml
    dir: ./minio
    aliases:
      - minio
  file-tools:
    taskfile: ./file-tools/Taskfile.yml
    dir: ./file-tools
    aliases:
      - file-tools
tasks:
  default:
    desc: S3 MinIO 文件处理 对象存储管理
    dir: . # 强制在当前 Taskfile 所在目录（storage/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/storage/
      - ls # 只会列出 storage/ 下的文件
    silent: true
