# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  mock-server:
    taskfile: ./mock-server/Taskfile.yml # 子 Taskfile 路径
    dir: ./mock-server # 该 Taskfile 所在目录（关键）
    aliases:
      - mock-server
tasks:
  default:
    desc: Mock Server 测试数据生成
    dir: '{{.TASKFILE_DIR}}' # 强制在当前 Taskfile 所在目录（test/fixtures/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/test/fixtures/
      - ls # 只会列出 test/fixtures/ 下的文件
    silent: true
