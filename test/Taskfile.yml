# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  api:
    taskfile: ./api/Taskfile.yml # 子 Taskfile 路径
    dir: ./api # 该 Taskfile 所在目录（关键）
    aliases:
      - api
  integration:
    taskfile: ./integration/Taskfile.yml
    dir: ./integration
    aliases:
      - integration
  load:
    taskfile: ./load/Taskfile.yml
    dir: ./load
    aliases:
      - load
  fixtures:
    taskfile: ./fixtures/Taskfile.yml
    dir: ./fixtures
    aliases:
      - fixtures
tasks:
  default:
    desc: API 测试 集成测试 性能测试 测试数据管理
    dir: . # 强制在当前 Taskfile 所在目录（test/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/test/
      - ls # 只会列出 test/ 下的文件
    silent: true
