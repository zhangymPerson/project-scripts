# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'
vars:
  GREETING: Hello, world!
# 配置 includes，通过 dir 指定子目录路径
includes:
  # 给子 Taskfile 起别名（如 included），dir 指向子目录
  shared:
    taskfile: ./shared/Taskfile.yml # 子 Taskfile 路径
    dir: ./shared # 该 Taskfile 所在目录（关键）
    aliases:
      - shared
  v1:
    taskfile: ./v1/Taskfile.yml
    dir: ./v1
    aliases:
      - v1
  v2:
    taskfile: ./v2/Taskfile.yml
    dir: ./v2
    aliases:
      - v2
tasks:
  default:
    desc: HTTP API v1 v2 共享组件测试
    dir: . # 强制在当前 Taskfile 所在目录（test/api/http/）执行
    cmds:
      - pwd # 验证：输出会是 .../project-scripts/test/api/http/
      - ls # 只会列出 test/api/http/ 下的文件
    silent: true
